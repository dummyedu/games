knowledge:
  known_facts:
    - The active subject had a prior fire-root reaction in servant registration.
    - Formal outer entry requires a spirit root retest.
    - The formal retest confirmed a single-element heavenly fire root.
    - The active subject completed Qingyang outer-disciple registration.
    - Fire spells and fire-control techniques should match the active subject.
    - The first issued spell is Fireball.
    - Qinglan Herb Market has low-tier herb bundles around three low-grade spirit stones, but bundle quality varies.
    - The first reading of the Fireball manual is complete, but actual casting practice still requires a safe place and fresh time.
    - Chen Qiao says new outer disciples normally learn practice ground rules before casting combat spells.
    - Luo Jing says Fireball practice should start at the practice ground with low mana output and a clear target lane.
    - The active subject completed a first safe low-output Fireball practice session at the Qingyang practice ground.
    - Mission Hall task boards separate low-risk sect errands from field tasks with travel and beast risk.
    - Fireball has crossed the formal entry threshold after a safe afternoon practice session, but it is not yet practiced or reliable under pressure.
    - Qingyang outer disciples are not locked into daily classes, but new outer disciples must complete a rules briefing by the third day after registration.
    - Public outer lectures are optional but recorded; the next fire foundation lecture is posted for Qingyang year 73, spring month 2, day 16 morning.
    - A heavenly fire root creates sect attention, but does not grant direct access to elders, a master, or the Golden Core ancestor.
    - A practical route to Qi Refining layer 2 is to combine daily cultivation, controlled Fireball drills, the ordinary qi gathering pill, and low-risk sect routine compliance before field tasks.
    - The required new outer-disciple rules briefing has been completed.
    - The active subject attended the first available fire foundation public lecture and learned better ignition timing for Fireball.
    - Sustained low-output drills raised Fireball from entry-level casting to practiced fixed-target reliability.
    - The active subject reached Qi Refining layer 2 on Qingyang year 73, spring month 2, day 27 morning.
    - The active subject registered the Qi Refining layer-2 breakthrough at Outer Affairs Hall.
    - The next outer-court spring drill contest is posted for Qingyang year 73, spring month 2, day 35, with registration from day 31 to day 33.
    - Luo Jing recently saw scorch-claw tracks near ridge-side herb routes and advised returning before dusk.
    - The active subject and Luo Jing accepted a near-ridge dewleaf gathering task for day 28 morning.
    - Combat experience helps with battlefield judgment, threat reading, retreat timing, and public sparring evaluation; it does not directly raise cultivation realm.
    - A juvenile Firestripe Wolf was repelled during the first near-ridge task; it withdrew alive, so no beast materials were harvested.
    - A self-directed wild trial near Qinglan Outer Ridge is not an official task and gives no guaranteed reward.
  rumors:
    - Chen Qiao claims outer disciples who delay tasks too long may get worse assignments, but the exact rule is unverified.
    - Chen Qiao says Mission Hall herb-gathering tasks have been frequent lately because pill demand is high.
    - Some Mission Hall notices imply Demonwood Forest herb routes are paying more because gatherers have been avoiding them.

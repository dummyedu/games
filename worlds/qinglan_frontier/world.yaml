  day_13_notes:
    - The active subject woke in the Fire Courtyard temporary room after a full night's rest.
    - The day is open for residence registration, practice-ground use, routine inquiries, or sect tasks.
    - The active subject spent late morning at the practice ground doing low-output Fireball attempts.
    - The active subject reached Mission Hall at noon to inspect tasks, not yet accepting one.

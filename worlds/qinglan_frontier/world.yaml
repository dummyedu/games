    summary:
      - Chen Qiao completed small outer-court errands and heard rumors about the active subject's unusually fast layer-2 breakthrough.
      - Luo Jing joined one low-risk ridge-side team task and returned with practical information about recent beast signs.
      - Han Yue received procedural notice that the heavenly-root newcomer had completed rules briefing, attended a lecture, and reached layer 2.
      - Mission Hall refreshed some early tasks; field-task risk notes changed with recent gatherer reports.
day_27_notes:
  - The active subject registered the Qi Refining layer-2 breakthrough at Outer Affairs Hall in the morning.
  - Outer Affairs did not issue extra resources immediately, but recorded the breakthrough and forwarded the observation note.
  - The active subject asked about sect competitions and learned of an upcoming outer-court drill contest.
  - Luo Jing agreed to join one cautious near-ridge dewleaf task tomorrow, but refused to make the Demonwood-edge task the first field outing.
  - The active subject accepted the near-ridge dewleaf task as a two-person outing with a return-before-dusk condition.
day_28_notes:
  - The active subject and Luo Jing departed in the morning for the near-ridge dewleaf task.
  - They gathered enough dewleaf by early afternoon and encountered one juvenile Firestripe Wolf probing the route.
  - Luo Jing chose a conservative response: hold position, use Fireball to force distance, and avoid chasing into ridge brush.
  - The wolf withdrew alive, so no beast materials were harvested.
  - The team returned before dusk and reported task completion at Mission Hall.
  - The active subject returned to the Fire Courtyard after the task, did not train further, and slept through the night.
day_29_notes:
  - The active subject woke after a full night's rest with mana recovered.
  - The first field task left practical fatigue and one combat-experience point, but no wound.
  - The active subject chose a self-directed near-ridge wild trial instead of accepting a task or asking Luo Jing to accompany him.
  - Self-directed wild trial access is allowed for an outer disciple in daylight, but gives no task reward and carries higher personal responsibility.

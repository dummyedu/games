    - The active subject woke after rest with mana recovered.
    - Fireball has crossed the entry threshold but remains far from practiced combat reliability.
    - The active subject spent the morning checking outer-disciple routine rules and forming a training plan instead of accepting a task.
  day_14_to_27_training_notes:
    - Day 14 late morning was spent completing the required new outer-disciple rules briefing.
    - Day 14 afternoon was spent under Luo Jing's informal correction at the practice ground, improving Fireball control without damaging shared targets.
    - Day 15 began a focused cultivation period using the issued ordinary qi gathering pill; the pill was consumed and mild pill-poison residue accumulated.
    - Day 16 morning was spent attending the posted fire foundation public lecture; later practice focused on ignition timing instead of brute output.
    - Days 17 to 26 were spent alternating closed-door cultivation, low-output Fireball drills, sleep, and routine quiet-hours compliance, with no sect task accepted.
    - Day 27 morning the active subject crossed the Qi Refining layer 1 threshold and stabilized at Qi Refining layer 2 without forcing the breakthrough.

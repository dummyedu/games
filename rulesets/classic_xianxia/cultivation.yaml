id: rules-cultivation-v1
spiritual_roots:
  five_element_roots:
    elements: [metal, wood, water, fire, earth]
    daily_cp: 0.6
    spell_affinities: [metal, wood, water, fire, earth]
    description: Slowest common cultivation speed, broad but shallow spell compatibility.
  four_element_roots:
    elements: variable_four
    daily_cp: 0.75
    description: Slow cultivation speed with one missing basic element.
  three_element_roots:
    elements: variable_three
    daily_cp: 0.9
    description: Common mixed roots with moderate difficulty.
  dual_element_roots:
    elements: variable_two
    daily_cp: 1.2
    description: Faster than mixed roots, narrower spell compatibility.
  single_element_heavenly_root:
    elements: variable_one
    daily_cp: 2.5
    description: Heavenly root with one pure basic element, fast cultivation and strong matching spells.
  mutated_root:
    elements: mutated
    daily_cp: 2.8
    description: Rare variant root such as wind, ice, thunder, or darkness; fast and often combat-favored.
  hidden_root:
    elements: hidden
    daily_cp: 1.0
    description: Special root that requires discovery before its true benefit is available.
qi_refining_thresholds:
  layer_1_to_2: 120
  layer_2_to_3: 240
  layer_3_to_4: 480
  layer_4_to_5: 900
  layer_5_to_6: 1400
  layer_6_to_7: 2200
  layer_7_to_8: 3300
  layer_8_to_9: 5000
  layer_9_to_perfection: 4000
cultivation_states:
  not_cultivating:
    monthly_cp_min: 0
    monthly_cp_max: 0
  occasional:
    monthly_cp_min: 1
    monthly_cp_max: 10
  stable:
    monthly_cp_min: 20
    monthly_cp_max: 60
  key_target:
    monthly_cp_min: 60
    monthly_cp_max: 150
